<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/client/">
    <title>Tableau de bord - Client | Vendza</title>
    <link rel="stylesheet" href="tableau-de-bord-client.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="../theme-vendza.css">
  <script src="/vendza-fix-assets.js"></script>
</head>
<body>
    <header class="header">
        <div class="brand">
            <a href="../index.html">Vendza</a>
        </div>
        <nav class="top-nav">
            
            <a href="/client/panier" class="btn btn-primary"><i class="fas fa-shopping-cart"></i> Panier <span id="cartCount" class="badge">0</span></a>
        </nav>
    </header>

    <main class="container">
        <aside class="sidebar">
            <div class="user-card">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <div class="user-info">
                    <h3 id="userName">Client Vendza</h3>
                    <p id="userEmail">—</p>
                </div>
            </div>
            <ul class="menu">
                <li><a href="profil-client.html"><i class="fas fa-id-card"></i> Mon profil</a></li>
                <li><a href="historique-des-commandes.html"><i class="fas fa-receipt"></i> Mes commandes</a></li>
                <li><a href="../index.html"><i class="fas fa-bag-shopping"></i> Continuer mes achats</a></li>
                <li><a href="../authentification/connexion.html"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
            </ul>
        </aside>

        <section class="content">
            <h1>Tableau de bord</h1>
            <div class="stats-grid">
                <div class="stat">
                    <div class="stat-icon blue"><i class="fas fa-box"></i></div>
                    <div class="stat-info">
                        <h3 id="ordersCount">0</h3>
                        <p>Commandes</p>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3 id="deliveredCount">0</h3>
                        <p>Livrées</p>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon purple"><i class="fas fa-cart-shopping"></i></div>
                    <div class="stat-info">
                        <h3 id="cartItems">0</h3>
                        <p>Articles panier</p>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2>Commandes récentes</h2>
                    <a href="historique-des-commandes.html" class="link">Tout voir</a>
                </div>
                <div id="ordersList" class="orders-list">
                    <!-- items injected by JS -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2024 Vendza</p>
    </footer>

    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="../config.js"></script>
    <script src="../supabaseclient.js"></script>
    <script src="tableau-de-bord-client.js"></script>
    <script src="../guest-drawer.js"></script>

    <script src="/vendza-urls.js"></script>
    <script src="../vendza-loading.js"></script>
    <script src="../dynamic-runtime.js"></script>
</body>
</html>

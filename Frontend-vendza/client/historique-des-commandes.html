<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/client/">
  <title>Mes commandes – Vendza</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../theme-vendza.css">
  <link rel="stylesheet" href="historique-commandes-v2.css">
  <script src="/vendza-fix-assets.js"></script>
</head>
<body class="hist-page">

  <div class="page">
    <div class="page-header">
      <div class="ph-grid"></div>
      <div class="ph-top">
        <div>
          <div class="ph-title">Mes commandes</div>
          <div class="ph-sub">Suivez et validez vos achats</div>
        </div>
        <a class="btn-scanner" href="confirmation.html">📱 Scanner un QR</a>
      </div>
      <div class="ph-stats">
        <div class="ph-stat"><div class="sv" id="stat-total">0</div><div class="sl">Total</div></div>
        <div class="ph-stat"><div class="sv" id="stat-livrees">0</div><div class="sl">Livrées</div></div>
        <div class="ph-stat"><div class="sv" id="stat-depenses">0</div><div class="sl">Gdes dépensées</div></div>
      </div>
    </div>

    <div class="scan-banner">
      <div class="sb-left">
        <h3>Vous venez de recevoir une livraison ?</h3>
        <p>Scannez le QR code du colis pour confirmer</p>
      </div>
      <a class="btn-scan-now" href="confirmation.html">Scanner →</a>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Rechercher une commande, un vendeur…" />
      </div>
      <div class="filter-row">
        <select class="f-select" id="filter-periode">
          <option value="">Toutes périodes</option>
          <option value="7">7 derniers jours</option>
          <option value="30">30 derniers jours</option>
          <option value="90">90 derniers jours</option>
        </select>
        <select class="f-select" id="filter-sort">
          <option value="recent">Plus récentes</option>
          <option value="ancien">Plus anciennes</option>
          <option value="total-desc">Total décroissant</option>
        </select>
      </div>
    </div>

    <div class="status-tabs" id="status-tabs">
      <button type="button" class="stab active" data-tab="">Tout <span class="sc" id="tab-all">0</span></button>
      <button type="button" class="stab" data-tab="livree">Livrées <span class="sc" id="tab-livree">0</span></button>
      <button type="button" class="stab" data-tab="payee">En cours <span class="sc" id="tab-payee">0</span></button>
      <button type="button" class="stab" data-tab="attente">En attente <span class="sc" id="tab-attente">0</span></button>
      <button type="button" class="stab" data-tab="annulee">Annulées <span class="sc" id="tab-annulee">0</span></button>
    </div>

    <div class="commandes-list" id="commandes-list"></div>
  </div>

  <div class="hist-toast" id="hist-toast"></div>

  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../config.js"></script>
  <script src="../supabaseclient.js"></script>
  <script src="../vendza-order-prices.js"></script>
  <script src="../guest-drawer.js"></script>
  <script src="historique-des-commandes.js"></script>
  <script src="vendza-urls.js"></script>
  <script src="../vendza-loading.js"></script>
  <script src="../dynamic-runtime.js"></script>
</body>
</html>

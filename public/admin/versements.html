<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Versement du Samedi - Admin Vendza</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen">

  <!-- Header / Navigation -->
  <header class="bg-gradient-to-r from-[#0c1445] via-[#1e3a8a] to-[#0d9488] text-white py-6 shadow-md mb-8">
    <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-3">
        <div class="bg-teal-500/20 p-2 rounded-xl border border-teal-300/35">
          <span class="text-2xl">💰</span>
        </div>
        <div>
          <h1 class="text-xl font-bold tracking-tight">Vendza Administrator</h1>
          <p class="text-xs text-teal-300">Console des Versements du Samedi</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="marquerToutPayé()" class="bg-white/10 hover:bg-white/20 border border-white/20 hover:border-white/40 text-white font-bold py-2 px-4 rounded-xl text-xs transition-all uppercase tracking-wider cursor-pointer">
          ✓ Tout marquer payé
        </button>
        <button onclick="chargerVersements()" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-2 px-4 rounded-xl text-xs transition-all uppercase tracking-wider flex items-center gap-1 cursor-pointer">
          🔄 Actualiser
        </button>
      </div>
    </div>
  </header>

  <!-- Main Grid Content -->
  <main class="max-w-6xl mx-auto px-4 pb-16">
    
    <!-- Résumé de Versement Container -->
    <div id="resume-versements" class="mb-8">
      <div class="animate-pulse bg-white rounded-2xl p-6 border border-slate-100 shadow-sm">
        <div class="h-4 bg-slate-200 rounded w-1/4 mb-4"></div>
        <div class="h-8 bg-slate-200 rounded w-1/2"></div>
      </div>
    </div>

    <!-- Payout List Container -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="border-b border-rose-50 px-6 py-4 bg-indigo-50/30 flex justify-between items-center">
        <h3 class="font-bold text-slate-700 text-sm">Liste des versements en attente</h3>
        <span class="text-xs text-[#0d9488] font-mono bg-teal-50 border border-teal-200 py-1 px-2.5 rounded-full font-bold">Règlement hebdomadaire libre</span>
      </div>
      <div id="liste-versements" class="divide-y divide-slate-100 p-6 space-y-4">
        <!-- Loader -->
        <p class="text-center text-slate-500 py-8 text-xs font-medium">Chargement des versements en suspens...</p>
      </div>
    </div>
  </main>

  <!-- Custom beautiful Toast element -->
  <div id="toast" class="fixed bottom-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-lg transform translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-2 select-none z-50">
    <span class="text-lg">✅</span>
    <span id="toast-message" class="text-xs font-bold font-sans">Action effectuée</span>
  </div>

  <script src="../config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let supabase;
    if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_ANON_KEY !== 'undefined') {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } else {
      // Prompt credentials or load defaults if config is absent
      const bkUrl = 'https://giakjeanwekipnvyhlxm.supabase.co';
      const bkKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpYWtqZWFud2VraXBudnlobHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMzNzc3NDUsImV4cCI6MjA2ODk1Mzc0NX0.HIFGP05gEXGYClb9vAVf0QIl7D6zbWRxB5o84HtwAgg';
      supabase = window.supabase.createClient(bkUrl, bkKey);
    }

    // Show Toast Notification
    const showToast = (message, type = 'success') => {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      toastMsg.textContent = message;
      if (type === 'error') {
        toast.classList.replace('bg-emerald-600', 'bg-red-600');
      } else {
        toast.classList.replace('bg-red-600', 'bg-emerald-600');
      }
      toast.classList.remove('translate-y-24', 'opacity-0');
      
      setTimeout(() => {
        toast.classList.add('translate-y-24', 'opacity-0');
      }, 3500);
    };

    const chargerVersements = async () => {
      try {
        // Récupérer tous les vendeurs avec solde disponible
        const { data: wallets, error } = await supabase
          .from('vendor_wallets')
          .select(`
            *,
            profiles:vendor_id (
              prenom, nom, email
            ),
            shops:vendor_id (
              shop_name, moncash, moncash_nom,
              bank_name, bank_account
            )
          `)
          .gt('available_balance', 0)
          .order('available_balance', { ascending: false });

        if (error) {
          console.error("Error charging wallets:", error.message);
          showToast("Erreur de récupération des soldes", "error");
          return;
        }

        // Calculer le total à verser
        const totalAVerser = wallets?.reduce(
          (sum, w) => sum + (Number(w.available_balance) || 0), 0
        ) || 0;

        // Afficher le résumé
        document.getElementById('resume-versements')
          .innerHTML = `
            <div class="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm bg-gradient-to-br from-white to-slate-50/50">
              <h2 class="text-base font-bold text-slate-800 mb-4 flex items-center gap-1.5">💰 Versements du Samedi</h2>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-slate-50 border border-slate-100 p-4 rounded-xl flex flex-col justify-center">
                  <div class="text-3xl font-black text-slate-900">
                    ${wallets?.length || 0}
                  </div>
                  <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider mt-1">Vendeurs à payer</div>
                </div>
                <div class="bg-indigo-50/50 border border-indigo-100 p-4 rounded-xl flex flex-col justify-center">
                  <div class="text-3xl font-black text-[#1e3a8a]">
                    ${totalAVerser.toLocaleString()} HTG
                  </div>
                  <div class="text-xs text-slate-500 font-semibold uppercase tracking-wider mt-1">Total à verser</div>
                </div>
              </div>
            </div>
          `;

        // Afficher la liste des vendeurs
        const liste = document.getElementById('liste-versements');
        
        if (!wallets || wallets.length === 0) {
          liste.innerHTML = '<div class="text-center text-slate-500 py-12 text-xs font-semibold">Aucun versement disponible à effectuer pour le moment.</div>';
          return;
        }

        liste.innerHTML = wallets.map(w => `
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center py-5 gap-4 hover:bg-slate-50/50 px-3 rounded-xl transition-all" id="vendeur-${w.vendor_id}">
            <div class="space-y-1 md:space-y-1.5">
              <div class="text-sm font-bold text-slate-800 flex items-center gap-1.5">
                <span>🏪 ${w.shops?.shop_name || 'Boutique'}</span>
                <span class="text-[10px] bg-slate-100 border text-slate-600 font-mono py-0.5 px-2 rounded-full">${w.vendor_id.slice(0, 6)}</span>
              </div>
              <div class="text-xs text-slate-600 font-medium flex items-center gap-1">
                👤 ${w.profiles?.prenom || ''} ${w.profiles?.nom || 'Vendeur anonyme'} (${w.profiles?.email || 'Pas d\'email'})
              </div>
              <div class="text-xs text-amber-800 bg-amber-50 border border-amber-200/50 rounded-lg p-2 flex flex-col gap-1 inline-block mt-1 max-w-lg">
                <span class="font-bold flex items-center gap-1">📱 Information MonCash :</span>
                <span>Portefeuille : ${w.shops?.moncash || 'Non renseigné'} (${w.shops?.moncash_nom || 'Nom non défini'})</span>
              </div>
              ${w.shops?.bank_name ? `
                <div class="text-xs text-indigo-700 bg-indigo-50 border border-indigo-100 rounded-lg p-2 flex flex-col gap-1 max-w-lg">
                  <span class="font-bold">🏦 Compte Bancaire :</span>
                  <span>Banque : ${w.shops.bank_name} - Compte : ${w.shops.bank_account || 'N/A'}</span>
                </div>
              ` : ''}
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0 self-stretch md:self-auto w-full md:w-auto">
              <div class="text-lg font-black text-[#0d9488]">
                ${w.available_balance.toLocaleString()} HTG
              </div>
              <button 
                onclick="marquerPayé('${w.vendor_id}', ${w.available_balance})"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-xl text-xs transition-all w-full md:w-auto cursor-pointer flex justify-center items-center gap-1"
                id="btn-${w.vendor_id}">
                ✓ Marquer payé
              </button>
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error("Exception checking wallet payments list:", err);
      }
    };

    const marquerPayé = async (vendorId, montant) => {
      if(!confirm(`Confirmer le versement de ${montant.toLocaleString()} HTG ?`)){
        return;
      }

      try {
        // Créer le payout
        const { error: payoutErr } = await supabase
          .from('payouts')
          .insert({
            vendor_id:  vendorId,
            amount:     montant,
            status:     'paid',
            paid_at:    new Date().toISOString(),
            reference:  'Versement samedi ' + 
              new Date().toLocaleDateString('fr-FR'),
            created_at: new Date().toISOString()
          });

        if (payoutErr) {
          console.error("Error creating payout record:", payoutErr.message);
          showToast("Erreur d'enregistrement du virement", "error");
          return;
        }

        // Remettre le solde à zéro
        const { error: walletErr } = await supabase
          .from('vendor_wallets')
          .update({
            available_balance: 0,
            updated_at:        new Date().toISOString()
          })
          .eq('vendor_id', vendorId);

        if (walletErr) {
          console.error("Error resetting wallet balance:", walletErr.message);
          showToast("Erreur de réinitialisation du solde", "error");
          return;
        }

        // Notifier le vendeur
        await supabase
          .from('platform_messages')
          .insert({
            title:     '💸 Paiement reçu !',
            message:   `${montant.toLocaleString('fr-FR')} HTG ont été virés sur votre MonCash. Bonne semaine !`,
            audience:  vendorId,
            is_active: true
          });

        // Mettre à jour l'UI
        const targetCard = document.getElementById(`vendeur-${vendorId}`);
        const targetBtn = document.getElementById(`btn-${vendorId}`);
        if (targetCard) targetCard.style.opacity = '0.4';
        if (targetBtn) {
          targetBtn.textContent = '✅ Payé';
          targetBtn.disabled = true;
          targetBtn.classList.replace('bg-blue-600', 'bg-slate-400');
          targetBtn.classList.remove('hover:bg-blue-700');
        }

        showToast('Versement de ' + montant.toLocaleString() + ' HTG validé !', 'success');
        
        // Refresh values after a tiny delay
        setTimeout(chargerVersements, 1500);
      } catch (err: any) {
        console.error("Exception marking seller payout:", err.message);
      }
    };

    // Bouton tout marquer payé
    const marquerToutPayé = async () => {
      if(!confirm('Confirmer TOUS les versements d\'aujourd\'hui ?')){
        return;
      }
      
      try {
        const { data: wallets, error } = await supabase
          .from('vendor_wallets')
          .select('vendor_id, available_balance')
          .gt('available_balance', 0);

        if (error || !wallets || wallets.length === 0) {
          showToast("Aucun versement disponible à payer", "error");
          return;
        }

        showToast("Lancement des virements en cascade...");
        for(const wallet of wallets){
          await marquerPayé(
            wallet.vendor_id, 
            wallet.available_balance
          );
          // Pause entre chaque pour éviter rate limit
          await new Promise(r => setTimeout(r, 600));
        }
      } catch (err: any) {
        console.error("Error running batch payout process:", err.message);
      }
    };

    // Initial load on launch
    document.addEventListener('DOMContentLoaded', chargerVersements);
  </script>
</body>
</html>

# Render Blueprint Specification
# Learn more at: https://render.com/docs/blueprints

services:
  - type: web
    name: vendza
    env: node
    plan: starter # Render's starter tier
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000 # Render assigns a port dynamically, but we define a default here
      - key: BASE_URL
        sync: false
        description: "URL de production ex: https://vendza.store"
      - key: VITE_SUPABASE_URL
        sync: false
        description: "Supabase Project URL"
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
        description: "Supabase Anonymous Key (Client-side)"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        description: "Supabase Service Role Key (Server-side)"
      - key: BAZIK_USER_ID
        sync: false
        description: "Identifiant utilisateur Bazik"
      - key: BAZIK_SECRET_KEY
        sync: false
        description: "Clé secrète Bazik"
      - key: BAZIK_WEBHOOK_SECRET
        sync: false
        description: "Secret webhook Bazik depuis Dashboard → Developers → Credentials"
      - key: BAZIK_ENV
        value: sandbox
        description: "Changer en 'live' pour la production réelle"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EXCHANGE_RATE_API_KEY
        sync: false
      - key: SIGHTENGINE_API_USER
        sync: false
      - key: SIGHTENGINE_API_SECRET
        sync: false
      - key: ONESIGNAL_REST_API_KEY
        sync: false
      - key: VITE_ONESIGNAL_APP_ID
        sync: false
